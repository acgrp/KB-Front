<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- ul태그 li태그 6개 -->
    <ul>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
    </ul>

    <!-- ul>li*6 -->
    <ul>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
    </ul>

    <!-- header+main+footer -->
    <header></header>
    <main></main>
    <footer></footer>

    <!-- ul>li.test -->
    <ul>
      <li class="test"></li>
    </ul>

    <!-- ul>li#test -->
    <ul>
      <li id="test"></li>
    </ul>

    <!-- ul>li{1}*10 -->
    <ul>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
      <li>1</li>
    </ul>

    <!-- ul>li{$}*10 -->
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
      <li>5</li>
      <li>6</li>
      <li>7</li>
      <li>8</li>
      <li>9</li>
      <li>10</li>
    </ul>

    <!-- ul>li#li$.li$*3{li요소} -->
    <!-- *은 위치 노상관(li안에서는 어디든) -->
    <ul>
      <li id="li1" class="li1">li요소</li>
      <li id="li2" class="li2">li요소</li>
      <li id="li3" class="li3">li요소</li>
    </ul>
  </body>
</html>
