<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>if - else if - else</h3>
    <pre>
        if( 조건식1 ){
            조건식1이 true 일 때 수행할 코드

        }else if ( 조건식2 ) {
            조건식1이 flase 이면서
            조건식2가 true일 때 수행할 코드
            
        }else {
            위의 조건식들을 모두 만족하지 않는 경우
            수행할 코드
        }
    </pre>

    <script>
      let date = new Date();
      let month = date.getMonth() + 1;
      //   month = 13;
      console.log(month);
      // == - 같다
      // = - 대입연산자
      //  && - and(둘다 충족할 때)
      //  || - or (둘중 하나라도 충족할 때)
      if (3 <= month && month <= 5) {
        alert('봄');
      } else if (6 <= month && month <= 8) {
        alert('여름');
      } else if (9 <= month && month <= 11) {
        alert('가을');
      } else if (month == 12 || month == 1 || month == 2) {
        alert('겨울');
      } else {
        alert('잘못된 입력입니다');
      }
    </script>
  </body>
</html>
