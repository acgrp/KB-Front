<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let date = new Date();
      //   getMonth 류들 사용간 마지막에 ()입력
      let month = date.getMonth() + 1;
      console.log(month);

      if (3 <= month && month <= 5) {
        alert('봄');
      } else if (6 <= month && month <= 8) {
        alert('여름');
      } else if (9 <= month && month <= 11) {
        alert('가을');
      } else if (month == 12 || month == 1 || month == 2) {
        alert('겨울');
      } else {
        alert('잘못된 입력입니다');
      }
    </script>
  </body>
</html>
