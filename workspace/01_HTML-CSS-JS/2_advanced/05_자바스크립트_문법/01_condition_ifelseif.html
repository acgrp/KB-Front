<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let date = new Date();
      let time = date.getHours();

      if (time < 5) {
        alert('잠을 자');
      } else if (5 <= time && time < 7) {
        alert('준비');
      } else if (7 <= time && time < 9) {
        alert('출근');
      } else if (9 <= time && time < 12) {
        alert('빈둥 빈둥');
      } else if (12 <= time && time < 14) {
        alert('식사');
      } else if (14 <= time) {
        alert('여러 가지 업무를 수행합니다');
      }
    </script>
  </body>
</html>
