<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    body {
      /* 위치를 기준으로 삼는 부모 역할 부여 */
      position: relative;
    }

    div.box {
      width: 100px;
      height: 100px;
      /* 요소를 자유롭게 원하는 위치에 놓을 수 있게 하는 속성 */
      position: absolute;
    }

    #redbox {
      background-color: red;
      left: 0px;
      top: 0px;
      /* z-index : 수가 클 수록 위로 올라옴 */
      z-index: 100;
    }

    #greenbox {
      background-color: green;
      left: 40px;
      top: 40px;
      z-index: 10;
    }

    #bluebox {
      background-color: blue;
      left: 80px;
      top: 80px;
      z-index: 1;
    }
  </style>
</head>

<body>
  <h1>Lorem ipsum dolor amet</h1>
  <div id="allbox">
    <div id="redbox" class="box"></div>
    <div id="greenbox" class="box"></div>
    <div id="bluebox" class="box"></div>
  </div>
  <h1>Lorem ipsum dolor amet</h1>
</body>

</html>
