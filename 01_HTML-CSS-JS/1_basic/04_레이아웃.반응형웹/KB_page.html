<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KB Page</title>
    <link rel="stylesheet" href="KB_page.css/KB_Page.css" />
    <style></style>
  </head>
  <body>
    <main>
      <header>
        <!-- 클릭시 메인 페이지로 이동(임시라 #) -->
        <section>
          <a href="#"><img src="img/KB.png" alt="logo" id="main-logo" /></a>
        </section>
        <section>
          <section class="search-area">
            <form action="#" name="search-form">
              <!--             
                form태그 내부의 input이 서버&페이지로 전달 
                 단, input에 name속성이 존재해야만 전달
                 -->
              <fieldset>
                <!-- fieldset - form태그 내부에서 input을 종류별로 묶는 용도 (테두리)-->

                <input
                  type="text"
                  name="query"
                  placeholder="검색어를 입력해주세요"
                  autocomplete="off"
                  id="query"
                /><!-- placeholder - 사용전 나타내는 문구 / autocomplete - 자동완성-->

                <button id="search-btn">검색</button>
              </fieldset>
            </form>
          </section>
        </section>
        <section>공간</section>
      </header>

      <nav>
        <ul>
          <li><a href="#">K-디지털</a></li>
          <li><a href="#">프로그래밍</a></li>
          <li><a href="#">데이터 분석</a></li>
          <li><a href="#">정보보안</a></li>
          <li><a href="#">클라우드</a></li>
        </ul>
      </nav>
      <section class="content">
        <div>
          <h1>주요 컨텐츠 작성 부분</h1>
        </div>
        <div>
          <h1>사이드 메뉴</h1>
        </div>
      </section>

      <footer>
        <p>Copyright &copy; KB It's your life 606 class</p>
        <article>
          <a href="#">프로젝트 소개</a>
          <span>|</span>
          <a href="#">이용약관</a>
          <span>|</span>
          <a href="#">개인정보처리방침</a>
          <span>|</span>
          <a href="#">고객센터</a>
        </article>
      </footer>
    </main>
  </body>
</html>
