<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        border: 1px solid black;
        width: 400px;
        height: 150px;
      }

      .ellipsis {
        white-space: nowrap; /* 자동 줄바꿈 x */
        /* normal - 자동 줄 바꿈 / nowrap - 줄 바꿈 안함 / pre - 줄 바꿈 안함 / pre-wrap - 자동 줄 바꿈 */
        overflow: hidden; /* 칸 넘어가는거 안보이게 */
        text-overflow: ellipsis; /* hidden으로 숨긴걸 끝에 ...표시 */
      }
    </style>
  </head>
  <body>
    <h1 class="ellipsis">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </h1>
    <p class="ellipsis">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </p>
  </body>
</html>
