<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 양식을 제출 하기 위해선 form으로 둘러야함 -->
    <!-- get : 주소에 데이터 입력 / post : 주소변경x -->
    <!-- form안에 method로 get post 사용 가능 -->
    <form>
      <table>
        <tr>
          <label>
            이름
            <input type="text" />
          </label>
        </tr>

        <tr>
          <td>성별</td>
          <td>
            <input id="man" type="radio" name="gender" />
            <!-- radio는 name이 일치해야 둘중하나만 가능 -->
            <label for="man">남자</label>
            <!-- label은 id와 연결(checkbox, radio 등도 가능) -->
            <label for="woman">
              <input id="woman" type="radio" name="gender" />
              여자</label
            >
          </td>
        </tr>
      </table>
      <input type="submit" value="가입" />
    </form>

    <!-- 텍스트 작성 칸 생성, name과 value가 주소로 보내짐-->
    <input type="text" name="과일" value="오렌지" /><br />

    <!-- 체크 박스 생성 -->
    <input type="checkbox" /><br />

    <!-- 숫자만 입력 가능한 칸 생성 -->
    <input type="number" />

    <!-- 파일을 올릴수 있는 칸 생성 -->
    <input type="file" /><br />

    <!-- 숨기기 -->
    <input type="hidden" /><br />

    <!-- 사진 넣을 공간 생성, src : 주소, value : 사진이 없을때 출력 -->
    <input type="image" src="ㅑㅡㅎ/사진.jpg" value="사진입니다." /><br />

    <!-- 비밀번호 입력 칸 -->
    <input type="password" /><br />

    <!-- 라디오 버튼 생성, name이 같은거 끼리는 중복선택x -->
    <input type="radio" /><br />

    <!-- button : 그냥버튼 / reset : 입력을 처음 상태로 / submit : form을 서버로 제출 -->
    <input type="button" value="버튼" /><br />
    <input type="reset" /><br />
    <input type="submit" /><br />

    <!-- 텍스트 입력 칸 -->
    <textarea name="" id=""></textarea>

    <!-- (body내부)선택창 출력 / option으로 목록 추가 / multiple : 펼쳐두기 /
     / optgroup으로 묶기 가능, label로 이름지정-->
    <select name="" id="">
      <optgroup label="123">
        <option value="">ㅁㄴㅇㄹ</option>
      </optgroup>
      <optgroup label="45336">
        <option value="">asdf</option>
        <option value="">asdf</option>
      </optgroup>
    </select>

    <!-- fieldset : 테두리 / 테두리에 낌(fieldset내부에 사용했을 경우) -->
    <fieldset>
      <legend></legend>
    </fieldset>
    <!--  -->
  </body>
</html>
