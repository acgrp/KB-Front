<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        let newH1 = '';
        for (let i = 0; i < 10; i++) {
          newH1 += '<h1>Header - ' + i + ' </h1>';
        }

        //문서 객체 내부의 글자 변경
        document.body.textContent = newH1;

        // textContent는 텍스트 자체를 넣는것 이므로 실제 h1을 사용하려면 innerHTML 사용
        // document.body.innerHTML = newH1;
      };
    </script>
  </head>
  <body></body>
</html>
