<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        //요소를 여러 개로 접근하면 [배열]로 나오기 때문에
        //한번에 변경이 안되고 반복문으로 하나하나 바꿔줘야 함

        // -> 배열 내의 요소에 css, 이벤트 등을 적용하고 싶으면
        // 인덱스 번호를 이용하여 요소 하나에 직접 적용 해야함
        let h1 = document.querySelectorAll('h1');

        for (let i = 0; i < h1.length; i++) {
          //변수 선언
          let header = h1[i];
          //문서 객체 조작
          header.style.color = 'orange';
          header.style.background = 'red';
          header.innerHTML = 'From JavaScript';
        }
      };
    </script>
  </head>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
