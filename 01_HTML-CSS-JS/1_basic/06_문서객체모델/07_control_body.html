<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        document.body.setAttribute('data-custom', 'value');
        //요소.setAttribute("속성명", "속성값")
        // -> 해당 요소에 속성명="속성값" 으로 추가.
        // -> <body data-custom="value">

        //속성을 추출합니다. (배열 : [] / js객체 : { K : V})
        let data = document.body.getAttribute('data-custom');
        // 요소.getAttribute("속성명") : 속성값 얻어오기

        alert(data);
      };
    </script>
  </head>
  <body>
    <div>practice</div>

    <script>
      //div 태그에 id 속성 추가 - id명 : practice
      //div 태그에 class 속성 추가 - class명 : pr
      let div = document.getElementsByTagName('div');

      // 얻어오는 요소가 하나여도 배열에 담김(복수 -> 반복문)
      for (let i = 0; i < div.length; i++) {
        div[i].setAttribute('id', 'practice');
        div[i].setAttribute('class', 'pr');

        // 이거도 가능(이건 단일 -> 그냥 변경)
        // document.querySelector('div').setAttribute('id', 'asd');
        // document.querySelector('div').setAttribute('class', 'hdgd');
      }
    </script>
  </body>
</html>
