<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>로그인</legend>
        <table>
          <!-- 아이디 -->
          <tr>
            <th><label for="id">사용자 ID</label></th>
            <td><input id="id" type="text" /></td>
          </tr>
          <!-- 비밀번호 -->
          <tr>
            <th><label for="password">비밀번호</label></th>
            <td><input id="password" type="password" /></td>
          </tr>
          <!-- 비밀번호 확인 -->
          <tr>
            <th><label for="password2">비밀번호 확인</label></th>
            <td><input id="password2" type="password" /></td>
          </tr>
          <!-- 이름 -->
          <tr>
            <th><label for="name">이름</label></th>
            <td><input id="name" type="text" /></td>
          </tr>
          <!-- 성별선택 (radio) -->
          <tr>
            <th><label>성별</label></th>
            <td>
              <input id="man" type="radio" name="gender" />
              <label for="man">남</label>
              <input id="woman" type="radio" name="gender" />
              <label for="woamn">여</label>
            </td>
          </tr>
          <!-- 취미 (checkbox) -->
          <tr>
            <th><label>취미</label></th>
            <td>
              <input id="soccer" type="checkbox" />
              <label for="soccer">축구</label>

              <input id="baseboll" type="checkbox" />
              <label for="baseboll">야구</label>

              <input id="volleyball" type="checkbox" />
              <label for="volleyball">배구</label>

              <input id="basketball" type="checkbox" />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <!-- 이메일 -->
          <tr>
            <th><label for="email">email</label></th>
            <td><input id="email" type="email" /></td>
          </tr>
          <!-- 역할 (select) -->
          <tr>
            <th><label for="positoin">역할</label></th>
            <td>
              <select id="positoin">
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <!-- 버튼 -->
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
