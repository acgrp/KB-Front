<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        position: absolute;
      }

      #redbox {
        background-color: red;
        left: 10px;
        top: 10px;
      }

      #greenbox {
        background-color: green;
        left: 50px;
        top: 50px;
      }

      #bluebox {
        background-color: blue;
        left: 90px;
        top: 90px;
      }
    </style>
  </head>
  <body>
    <div id="redbox" class="box1"></div>
    <div id="greenbox" class="box2"></div>
    <div id="bluebox" class="box3"></div>
  </body>
</html>
