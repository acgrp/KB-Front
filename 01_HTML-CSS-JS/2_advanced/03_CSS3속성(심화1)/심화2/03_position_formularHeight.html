<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }

      #allbox {
        width: 400px;
        height: 100px;
        border: 3px solid black;
        /* (absolute)요소를 자유롭게 원하는 위치에 놓을 수 있게 하는 속성 */
        position: relative;
        /* 네모칸 넘어가면 자르기 */
        overflow: hidden;
      }

      #redbox {
        background-color: red;
        left: 10px;
        top: 10px;
        /* z-index : 수가 클 수록 위로 올라옴 */
        z-index: 100;
      }

      #greenbox {
        background-color: green;
        left: 50px;
        top: 50px;
        z-index: 10;
      }

      #bluebox {
        background-color: blue;
        left: 90px;
        top: 90px;
        z-index: 1;
      }
    </style>
  </head>

  <body>
    <h1>Lorem ipsum dolor amet</h1>
    <div id="allbox">
      <div id="redbox" class="box"></div>
      <div id="greenbox" class="box"></div>
      <div id="bluebox" class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
  </body>
</html>
